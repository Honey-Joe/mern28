<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="max-w-[100%]">
        <div class="w-[80%] mx-auto grid grid-cols-1 md:grid-cols-2">
            <div class="bg-red-500 flex justify-between items-center">
                <p>Logo</p>
                <div>
                    <button class="md:hidden" id="menuBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-menu-icon lucide-menu"><path d="M4 5h16"/><path d="M4 12h16"/><path d="M4 19h16"/></svg>
                    </button>
                    <button class="hidden md:hidden" id="closeBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x-icon lucide-x"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                    </button>
                </div>
            </div>
            <div class="bg-green-500 hidden md:block" id="navItem">
                <ul class="flex flex-col md:flex-row gap-5 justify-end items-center h-full">
                    <li><a href="#" class="hover:text-blue-500">Home</a></li>
                    <li><a href="#" class="hover:text-blue-500">About</a></li>
                    <li><a href="#" class="hover:text-blue-500">Contact</a></li>
                </ul>
            </div>

        </div>

    </div>
</body>
<script>
    let menuBtn = document.getElementById("menuBtn")
    let closeBtn = document.getElementById("closeBtn")
    let navItem = document.getElementById("navItem")

    menuBtn.addEventListener("click" , function(){
        navItem.classList.remove("hidden")
        closeBtn.classList.remove("hidden")
        menuBtn.classList.add("hidden")
    })

    closeBtn.addEventListener("click" , ()=>{
        navItem.classList.add("hidden")
        closeBtn.classList.add("hidden")
        menuBtn.classList.remove("hidden")
    })





</script>
</html>
